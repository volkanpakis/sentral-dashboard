<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentral Portfolio Dashboard — Week Ending May 3, 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f8fafc;color:#1e293b;font-size:14px;line-height:1.5;}
/* HEADER */
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:34px;height:34px;border-radius:8px;background:#1d4ed8;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;}
.brand-name{font-size:15px;font-weight:700;color:#0f172a;}
.hdr-right{display:flex;align-items:center;gap:14px;}
.week-lbl{font-size:12px;color:#64748b;} .week-lbl strong{color:#334155;}
.live-pill{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:700;background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0;}
/* PROP SELECTOR BAR */
.prop-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 32px;display:flex;gap:0;overflow-x:auto;position:sticky;top:60px;z-index:190;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.prop-btn{padding:12px 16px;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap;flex-shrink:0;}
.prop-btn:hover{color:#334155;}
.prop-btn.active{color:#1d4ed8;border-bottom-color:#1d4ed8;font-weight:700;}
/* NAV TABS */
.nav{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:0 32px;display:flex;position:sticky;top:109px;z-index:180;}
.nav-tab{padding:10px 18px;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap;}
.nav-tab:hover{color:#334155;}
.nav-tab.active{color:#1d4ed8;border-bottom-color:#1d4ed8;font-weight:700;}
/* PAGE */
.page{max-width:1200px;margin:0 auto;padding:24px 32px 80px;}
.prop-panel{display:none;} .prop-panel.active{display:block;}
.tab-panel{display:none;} .tab-panel.active{display:block;}
/* PROP HEADER CARD */
.prop-hdr{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 24px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.prop-hdr-name{font-size:20px;font-weight:800;color:#0f172a;letter-spacing:-.02em;}
.prop-hdr-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;align-items:center;}
.badge{padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;}
.badge-city{background:#f1f5f9;color:#64748b;}
.badge-ok{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0;}
.badge-warn{background:#fffbeb;color:#92400e;border:1px solid #fde68a;}
.badge-dn{background:#fee2e2;color:#dc2626;border:1px solid #fecaca;}
.prop-hdr-stats{display:flex;gap:24px;}
.phs{text-align:right;}
.phs-lbl{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;}
.phs-val{font-size:22px;font-weight:800;letter-spacing:-.02em;}
/* SECTION */
.section{margin-bottom:26px;}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e2e8f0;}
.sec-num{width:22px;height:22px;border-radius:5px;background:#1d4ed8;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sn-g{background:#059669;} .sn-p{background:#7c3aed;} .sn-o{background:#d97706;} .sn-r{background:#dc2626;} .sn-gr{background:#64748b;}
.sec-title{font-size:14px;font-weight:700;color:#0f172a;}
.sec-sub{font-size:11px;color:#94a3b8;margin-left:auto;white-space:nowrap;}
/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.kpi{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;}
.kpi-lbl{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.kpi-val{font-size:22px;font-weight:800;color:#0f172a;line-height:1;letter-spacing:-.02em;}
.kpi-d{margin-top:4px;font-size:11px;font-weight:600;}
.kpi-s{margin-top:4px;font-size:11px;color:#94a3b8;}
.up{color:#16a34a;} .dn{color:#dc2626;} .fl{color:#94a3b8;}
.bl{color:#1d4ed8;} .pu{color:#7c3aed;} .am{color:#d97706;} .gr{color:#059669;}
/* OCC BAR */
.occ-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:18px;}
.occ-row{margin-bottom:14px;} .occ-row:last-of-type{margin-bottom:0;}
.occ-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;flex-wrap:wrap;gap:4px;}
.occ-name{font-size:12px;font-weight:600;color:#334155;}
.occ-right{display:flex;align-items:baseline;gap:10px;}
.occ-pct{font-size:17px;font-weight:800;color:#0f172a;}
.occ-vs{font-size:11px;color:#94a3b8;}
.bar-bg{height:9px;background:#f1f5f9;border-radius:5px;position:relative;overflow:visible;}
.bar-fill{height:100%;border-radius:5px;transition:width .7s ease;}
.budget-tick{position:absolute;top:-4px;width:2px;height:17px;background:#f59e0b;border-radius:1px;}
.leg-row{margin-top:10px;display:flex;gap:16px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b;}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
/* ALERTS */
.alert{padding:8px 12px;border-radius:8px;font-size:12px;margin-top:8px;display:flex;align-items:flex-start;gap:6px;}
.a-ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
.a-warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;}
.a-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;}
.a-err{background:#fff1f2;border:1px solid #fecdd3;color:#9f1239;}
/* GRIDS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.four-col{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
/* CHART */
.chart-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;}
.chart-lbl{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.ch{position:relative;height:150px;}
.ch-sm{position:relative;height:120px;}
.ch-lg{position:relative;height:190px;}
/* TABLES */
.tcard{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{background:#f8fafc;}
thead th{padding:7px 12px;text-align:right;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e2e8f0;white-space:nowrap;}
thead th:first-child{text-align:left;}
tbody tr:hover{background:#f8fafc;}
tbody td{padding:8px 12px;text-align:right;font-size:12px;color:#334155;border-bottom:1px solid #f1f5f9;white-space:nowrap;}
tbody td:first-child{text-align:left;font-weight:500;color:#0f172a;}
tbody tr:last-child td{border-bottom:none;}
tfoot tr{background:#eff6ff;border-top:2px solid #bfdbfe;}
tfoot td{padding:8px 12px;text-align:right;font-size:12px;font-weight:700;color:#1d4ed8;}
tfoot td:first-child{text-align:left;}
.tr-hi{background:#eff6ff !important;} .tr-hi td{font-weight:600 !important;} .tr-hi td:first-child{color:#1d4ed8 !important;}
/* VAR CARDS */
.var-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.var-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center;}
.var-lbl{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.var-val{font-size:20px;font-weight:800;letter-spacing:-.02em;}
.var-hint{font-size:11px;font-weight:500;margin-top:3px;}
.vp{color:#16a34a;} .vn{color:#dc2626;} .vf{color:#94a3b8;}
/* LTO SCORECARD */
.lto-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.lto-box{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;}
.lto-box-hdr{background:#f8fafc;padding:8px 14px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:#0f172a;text-transform:uppercase;letter-spacing:.05em;}
.lto-box-hdr span{font-size:10px;color:#94a3b8;margin-left:auto;font-weight:400;text-transform:none;}
.lto-cols{display:grid;grid-template-columns:1fr 1fr 1fr;}
.lto-col{padding:14px;border-right:1px solid #f1f5f9;}
.lto-col:last-child{border-right:none;}
.lto-col-lbl{font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.lto-col-cnt{font-size:11px;color:#64748b;margin-bottom:3px;}
.lto-col-d{font-size:20px;font-weight:800;letter-spacing:-.02em;}
.lto-col-p{font-size:12px;font-weight:700;margin-top:1px;}
/* LOS BARS */
.los-row{margin-bottom:8px;}
.los-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
.los-bg{height:7px;background:#f1f5f9;border-radius:3px;}
.los-fill{height:100%;border-radius:3px;transition:width .5s ease;}
/* DELIQ BADGE */
.dlq-badge{font-size:10px;background:#fee2e2;color:#dc2626;border-radius:4px;padding:1px 5px;margin-left:5px;font-weight:600;}
/* AI INSIGHTS */
.ai-dot{width:8px;height:8px;border-radius:50%;background:#6366f1;animation:aiPulse 1s ease-in-out infinite;}
@keyframes aiPulse{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
.ai-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px 20px;margin-bottom:10px;}
.ai-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ai-card-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ai-card-title{font-size:12px;font-weight:700;color:#0f172a;text-transform:uppercase;letter-spacing:.05em;}
.ai-card-priority{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.ai-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #f1f5f9;font-size:12px;color:#334155;line-height:1.5;}
.ai-item:last-child{border-bottom:none;padding-bottom:0;}
.ai-bullet{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
/* FOOTER */
.footer{margin-top:40px;padding-top:16px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;flex-wrap:wrap;gap:6px;}
@media(max-width:900px){
  .page{padding:12px;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .two-col,.three-col,.four-col,.var-grid{grid-template-columns:1fr 1fr;}
  .lto-grid{grid-template-columns:1fr;}
  .prop-bar,.nav{padding:0 8px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <div class="brand-mark">S</div>
    <div><div class="brand-name">Sentral Portfolio Dashboard</div></div>
  </div>
  <div class="hdr-right">
    <div class="week-lbl">Week ending <strong>May 3, 2026</strong></div>
    <div class="live-pill">● Live</div>
  </div>
</div>

<!-- PROPERTY SELECTOR -->
<div class="prop-bar" id="propBar"></div>

<!-- NAV TABS (shared, redrawn per property) -->
<div class="nav" id="navTabs"></div>

<div class="page" id="mainPage"></div>

<script>
// ── CHART DEFAULTS ────────────────────────────────────────────────────────────
Chart.defaults.font.family="'Inter',sans-serif";
Chart.defaults.font.size=11;
Chart.defaults.color='#64748b';
const grid={color:'#f1f5f9',drawBorder:false};
const tip={backgroundColor:'#fff',titleColor:'#0f172a',bodyColor:'#334155',borderColor:'#e2e8f0',borderWidth:1,padding:8,cornerRadius:6};
const activeCharts=[];
function destroyCharts(){activeCharts.forEach(c=>{try{c.destroy();}catch(e){}});activeCharts.length=0;}
function mkChart(id,cfg){const c=new Chart(document.getElementById(id),cfg);activeCharts.push(c);return c;}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const $d=s=>document.querySelector(s);
const fmt$=(n)=>n==null?'—':'$'+Number(n).toLocaleString();
const fmtK=(n)=>{if(n==null)return'—';const a=Math.abs(n);return(n<0?'-':'')+'$'+(a>=1e6?(a/1e6).toFixed(1)+'M':a>=1e3?(a/1e3).toFixed(0)+'K':a.toFixed(0));};
const fmtP=(n,dec=1)=>n==null?'—':n.toFixed(dec)+'%';
const sign=(n,prefix='')=>n>=0?`+${prefix}${Math.abs(n).toLocaleString()}`:`-${prefix}${Math.abs(n).toLocaleString()}`;
const signP=(n)=>n>=0?`+${n.toFixed(2)}%`:`${n.toFixed(2)}%`;
const varCls=(n)=>n>0?'vp':n<0?'vn':'vf';
const arrow=(n)=>n>0?'▲':n<0?'▼':'—';
const upDn=(n)=>n>0?'up':n<0?'dn':'fl';

function occBar(label,val,budget,color){
  const diff=val-budget;
  const cls=upDn(diff);
  return `<div class="occ-row">
    <div class="occ-top">
      <span class="occ-name">${label}</span>
      <div class="occ-right">
        <span class="occ-pct">${fmtP(val)}</span>
        <span class="occ-vs">vs ${fmtP(budget)} budget</span>
        <span class="kpi-d ${cls}">${diff>=0?'+':''}${diff.toFixed(1)}pp</span>
      </div>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(val,100)}%;background:${color};"></div><div class="budget-tick" style="left:${Math.min(budget,100)}%"></div></div>
  </div>`;
}

function trajTable(weeks){
  const rows=weeks.map((w,i)=>`<tr class="${i===0?'tr-hi':''}">
    <td>${i===0?w.week+' ◆':w.week}</td><td>${w.units}</td>
    <td class="${upDn(w.curr_occ-w.budg_occ)}">${fmtP(w.curr_occ)}</td>
    <td>${fmtP(w.budg_occ)}</td>
    <td class="${upDn(w.curr_occ-w.budg_occ)}">${w.curr_occ>=w.budg_occ?'+':''}${(w.curr_occ-w.budg_occ).toFixed(1)}pp</td>
    <td>${fmtP(w.occ_14d)}</td><td>${fmtP(w.occ_30d)}</td><td>${fmtP(w.occ_60d)}</td>
    <td>${w.leads}</td><td>${w.tours}</td><td>${w.net_leases}</td><td>${w.renews}</td><td>${w.ntv}</td><td>${w.t4_net}</td>
  </tr>`).join('');
  const avg=(arr,key)=>(arr.reduce((s,w)=>s+(w[key]||0),0)/arr.length);
  return `<div class="tcard"><table>
    <thead><tr><th>Week</th><th>Units</th><th>Occ%</th><th>Bdgt%</th><th>Var</th>
    <th>14d</th><th>30d</th><th>60d</th><th>Leads</th><th>Tours</th><th>Net Lse</th><th>Renews</th><th>NTV</th><th>T4 Lse</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td>4-Wk Avg</td><td>${weeks[0].units}</td>
    <td>${avg(weeks,'curr_occ').toFixed(1)}%</td><td>${avg(weeks,'budg_occ').toFixed(1)}%</td><td>—</td>
    <td>${avg(weeks,'occ_14d').toFixed(1)}%</td><td>${avg(weeks,'occ_30d').toFixed(1)}%</td><td>${avg(weeks,'occ_60d').toFixed(1)}%</td>
    <td>${Math.round(avg(weeks,'leads'))}</td><td>${Math.round(avg(weeks,'tours'))}</td>
    <td>${Math.round(avg(weeks,'net_leases'))}</td><td>${Math.round(avg(weeks,'renews'))}</td>
    <td>${Math.round(avg(weeks,'ntv'))}</td><td>${avg(weeks,'t4_net').toFixed(1)}</td></tr></tfoot>
  </table></div>`;
}

function ltoBox(label,color,data){
  if(!data)return'';
  const c=data.combined,n=data.new,r=data.renewal;
  const col=(v)=>v>0?'gr':v<0?'dn':'fl';
  return `<div class="lto-box">
    <div class="lto-box-hdr"><div style="width:9px;height:9px;border-radius:2px;background:${color};flex-shrink:0;"></div>${label}<span>Concessions amortized</span></div>
    <div class="lto-cols">
      <div class="lto-col"><div class="lto-col-lbl">Combined</div><div class="lto-col-cnt">${c.count} leases</div>
        <div class="lto-col-d ${col(c.gross_d)}">${sign('','')}${c.gross_d>=0?'+':''}$${Math.abs(c.gross_d).toLocaleString()}</div>
        <div class="lto-col-p ${col(c.gross_d)}">${signP(c.gross_pct)}</div></div>
      <div class="lto-col"><div class="lto-col-lbl">New Leases</div><div class="lto-col-cnt">${n.count} leases</div>
        <div class="lto-col-d ${col(n.gross_d)}">${n.gross_d>=0?'+':''}$${Math.abs(n.gross_d).toLocaleString()}</div>
        <div class="lto-col-p ${col(n.gross_d)}">${signP(n.gross_pct)}</div></div>
      <div class="lto-col"><div class="lto-col-lbl">Renewals</div><div class="lto-col-cnt">${r.count} leases</div>
        <div class="lto-col-d ${col(r.gross_d)}">${r.gross_d>=0?'+':''}$${Math.abs(r.gross_d).toLocaleString()}</div>
        <div class="lto-col-p ${col(r.gross_d)}">${signP(r.gross_pct)}</div></div>
    </div></div>`;
}

function ltoDetailTable(detail,label){
  if(!detail||detail.length===0)return`<div class="alert a-info">ℹ No ${label} data.</div>`;
  const rows=detail.map(r=>`<tr>
    <td>${r.fp}</td><td>${r.unit}</td><td>${r.sqft}</td><td>${r.app_date.slice(5)}</td><td>${r.lease_start.slice(5)}</td><td>${r.term} mo</td>
    <td>${fmt$(r.curr_gross)}</td><td>${r.conc>0?`<span class="${r.conc>1000?'dn':''}">${fmt$(r.conc)}</span>`:'—'}</td><td>${fmt$(r.curr_eff)}</td>
    <td>${fmt$(r.prev_gross)}</td><td>${fmt$(r.prev_eff)}</td>
    <td class="${r.vac_days>60?'dn':r.vac_days>30?'am':''}">${r.vac_days||'—'}</td>
    <td class="${upDn(r.gross_to_d)}">${r.gross_to_d>=0?'+':''}${fmt$(r.gross_to_d)}</td>
    <td class="${upDn(r.gross_to_d)}">${r.gross_to_pct>=0?'+':''}${r.gross_to_pct.toFixed(1)}%</td>
    <td class="${upDn(r.net_to_d)}">${r.net_to_d>=0?'+':''}${fmt$(r.net_to_d)}</td>
    <td class="${upDn(r.net_to_d)}">${r.net_to_pct>=0?'+':''}${r.net_to_pct.toFixed(1)}%</td>
  </tr>`).join('');
  return `<div class="tcard"><table>
    <thead><tr><th>Floor Plan</th><th>Unit</th><th>SF</th><th>App Date</th><th>Start</th><th>Term</th>
    <th>Curr Gross</th><th>Conc</th><th>Curr Eff</th><th>Prev Gross</th><th>Prev Eff</th><th>Vac Days</th>
    <th>Gross TO $</th><th>Gross TO %</th><th>Net TO $</th><th>Net TO %</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function deliqTenantTable(tenants){
  return `<div class="tcard"><table>
    <thead><tr><th>Unit</th><th>Tenant</th><th>Total Charges</th><th>0–30 Days</th><th>31–60 Days</th><th>61–90 Days</th><th>Over 90</th><th>Prepayments</th><th>Total Owed</th></tr></thead>
    <tbody>${tenants.map(t=>`<tr>
      <td>${t.unit}</td>
      <td>${t.name}${t.delinquent?'<span class="dlq-badge">DELINQUENT</span>':''}</td>
      <td>${fmt$(t.charges)}</td>
      <td>${t.owed_0_30>0?fmt$(t.owed_0_30):'—'}</td>
      <td class="${t.owed_31_60>0?'am':''}">${t.owed_31_60>0?fmt$(t.owed_31_60):'—'}</td>
      <td class="${t.owed_61_90>0?'dn':''}">${t.owed_61_90>0?fmt$(t.owed_61_90):'—'}</td>

const PROP_KEYS=Object.keys(PROPS);
let currentProp=PROP_KEYS[0];

// ── BUILD PROPERTY SELECTOR ───────────────────────────────────────────────────
function buildPropBar(){
  document.getElementById('propBar').innerHTML=PROP_KEYS.map(k=>{
    const p=PROPS[k];
    return `<button class="prop-btn${k===currentProp?' active':''}" onclick="selectProp('${k}')">${p.label.replace('Sentral ','')}</button>`;
  }).join('');
}

// ── BUILD TABS ────────────────────────────────────────────────────────────────
function buildNav(p){
  const tabs=[
    {id:'updates',label:'Property Updates'},
    {id:'leasing',label:'Leasing Overview'},
    ...(p.hasLive?[{id:'live',label:'Furnished / LIVE'}]:[]),
    {id:'str',label:'STR / Hotel'},
    {id:'otb',label:'OTB & Pickup'},
    {id:'lto',label:'Lease Tradeout'},
    ...(p.hasRetail?[{id:'retail',label:'Retail Delinquency'}]:[]),
    {id:'resid',label:'Residential Delinquency'},
  ];
  document.getElementById('navTabs').innerHTML=tabs.map((t,i)=>
    `<button class="nav-tab${i===0?' active':''}" onclick="switchTab('${t.id}',this)">${t.label}</button>`
  ).join('');
}

// ── SELECT PROPERTY ───────────────────────────────────────────────────────────
function selectProp(key){
  currentProp=key;
  buildPropBar();
  renderProperty();
}

function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('tab-'+name);
  if(el)el.classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='live'&&PROPS[currentProp].wynwoodFurnWeeks){
    setTimeout(()=>drawWynwoodCharts(PROPS[currentProp].wynwoodFurnWeeks),50);
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderProperty(){
  destroyCharts();
  const p=PROPS[currentProp];
  const w=p.weeks[0];// current week
  buildNav(p);

  const occVsBudget=w.curr_occ>=w.budg_occ?
    `<span class="badge badge-ok">▲ Above Budget</span>`:
    `<span class="badge badge-warn">▼ Below Budget</span>`;

  let html=`
  <!-- PROP HEADER -->
  <div class="prop-hdr">
    <div>
      <div class="prop-hdr-name">${p.label}</div>
      <div class="prop-hdr-meta">
        <span class="badge badge-city">${p.city}</span>
        ${occVsBudget}
        ${p.hasLive?'<span class="badge" style="background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;">LIVE</span>':''}
        ${p.hasRetail?'<span class="badge" style="background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;">Retail</span>':''}
      </div>
    </div>
  </div>

  <!-- TAB PANELS WRAPPER -->
  ${buildUpdatesTab(p)}
  ${buildLeasingTab(p)}
  ${p.hasLive?(p.wynwoodFurnWeeks?buildWynwoodLiveTab(p):buildLiveTab(p)):''}
  ${buildSTRTab(p)}
  ${buildOTBTab(p)}
  ${buildLTOTab(p)}
  ${p.hasRetail?buildRetailTab(p):''}
  ${buildResidTab(p)}

  <div class="footer">
    <span>Sentral · ${p.label} · Sources: Yardi Box Score · OTB PDFs · Daily Pickup CSV · LTO Data</span>
    <span>Week ending May 3, 2026 · Generated May 5, 2026</span>
  </div>`;

  document.getElementById('mainPage').innerHTML=html;
  // Activate first tab
  const firstTab=document.querySelector('.tab-panel');
  if(firstTab)firstTab.classList.add('active');

  // Draw charts
  drawCharts(p);
}

function buildOTBTab(p){
  const s=p.stay; const lv=p.live;
  const smtd=p.stayMTD||{rooms:0,occ:0,adr:0,revpar:0,revenue:0};
  const lmtd=p.liveMTD||null;

  // Build monthly pickup table rows
  function pickupRows(monthly){
    if(!monthly||monthly.length===0) return '<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:16px;">No data</td></tr>';
    return monthly.filter(m=>m.rooms>0).map(m=>`<tr>
      <td>${m.month}</td>
      <td>${m.rooms.toLocaleString()}</td>
      <td class="${m.occ>=50?'gr':m.occ>=25?'am':'dn'}">${m.occ}%</td>
      <td>${m.adr>0?'$'+m.adr.toLocaleString():'—'}</td>
      <td>${m.revpar>0?'$'+m.revpar.toLocaleString():'—'}</td>
      <td>$${(m.revenue/1000).toFixed(0)}K</td>
    </tr>`).join('');
  }

  const stayRows = pickupRows(p.stayMonthly||[]);
  const liveRows = lv ? pickupRows(p.liveMonthly||[]) : '';

  return `<div class="tab-panel" id="tab-otb">

  <!-- MTD SECTION -->

        <div class="kpi-val gr">$${(lmtd.revenue/1000).toFixed(0)}K</div>

function drawCharts(p){
  const w=p.weeks;
  const labels=w.map(x=>x.week).reverse();

  mkChart('chartLeadsTours',{type:'bar',
    data:{labels,datasets:[
      {label:'Leads',data:w.map(x=>x.leads).reverse(),backgroundColor:labels.map((_,i)=>i===labels.length-1?'#1d4ed8':'#bfdbfe'),borderRadius:4},
      {label:'Tours',data:w.map(x=>x.tours).reverse(),backgroundColor:labels.map((_,i)=>i===labels.length-1?'#7c3aed':'#ddd6fe'),borderRadius:4},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:9,padding:8,font:{size:10}}},tooltip:tip},
      scales:{x:{grid},y:{grid,ticks:{font:{size:10}}}}}
  });

  mkChart('chartOccTrend',{type:'line',
    data:{labels,datasets:[
      {label:'Current Occ',data:w.map(x=>x.curr_occ).reverse(),borderColor:'#1d4ed8',backgroundColor:'rgba(29,78,216,.05)',borderWidth:2.5,pointRadius:4,fill:true,tension:0.3},
      {label:'14d Trend',data:w.map(x=>x.occ_14d).reverse(),borderColor:'#7c3aed',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,3],pointRadius:3,tension:0.3},
      {label:'30d Trend',data:w.map(x=>x.occ_30d).reverse(),borderColor:'#d97706',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,3],pointRadius:3,tension:0.3},
      {label:'60d Trend',data:w.map(x=>x.occ_60d).reverse(),borderColor:'#dc2626',backgroundColor:'transparent',borderWidth:1.5,borderDash:[2,3],pointRadius:3,tension:0.3},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:9,padding:8,font:{size:10}}},
        tooltip:{...tip,callbacks:{label:c=>c.dataset.label+': '+c.raw.toFixed(1)+'%'}}},
      scales:{x:{grid,ticks:{font:{size:10}}},
        y:{grid,ticks:{callback:v=>v+'%',font:{size:10}},
          min:Math.max(0,Math.floor(Math.min(...w.map(x=>Math.min(x.curr_occ,x.occ_60d)))-3)),
          max:Math.min(100,Math.ceil(Math.max(...w.map(x=>x.curr_occ))+2))}}}
  });
}

// ── WYNWOOD FURNISHED CHARTS (drawn conditionally) ──────────────────────────
function drawWynwoodCharts(fw){
  if(!fw||!fw.length) return;
  const labels = fw.map(w=>w.week).reverse();
  if(document.getElementById('chartWynLT')){
    mkChart('chartWynLT',{type:'bar',
      data:{labels,datasets:[
        {label:'Leads',data:fw.map(w=>w.leads).reverse(),backgroundColor:labels.map((_,i)=>i===labels.length-1?'#1d4ed8':'#bfdbfe'),borderRadius:4},
        {label:'Tours',data:fw.map(w=>w.tours).reverse(),backgroundColor:labels.map((_,i)=>i===labels.length-1?'#059669':'#bbf7d0'),borderRadius:4},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:9,padding:8,font:{size:10}}},tooltip:tip},
        scales:{x:{grid},y:{grid}}}
    });
  }
  if(document.getElementById('chartWynOcc')){
    mkChart('chartWynOcc',{type:'line',
      data:{labels,datasets:[
        {label:'Current Occ',data:fw.map(w=>w.curr_occ).reverse(),borderColor:'#059669',backgroundColor:'rgba(5,150,105,.05)',borderWidth:2.5,pointRadius:4,fill:true,tension:0.3},
        {label:'14d Trend',data:fw.map(w=>w.occ_14d).reverse(),borderColor:'#1d4ed8',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,3],pointRadius:3,tension:0.3},
        {label:'30d Trend',data:fw.map(w=>w.occ_30d).reverse(),borderColor:'#d97706',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,3],pointRadius:3,tension:0.3},
        {label:'60d Trend',data:fw.map(w=>w.occ_60d).reverse(),borderColor:'#dc2626',backgroundColor:'transparent',borderWidth:1.5,borderDash:[2,3],pointRadius:3,tension:0.3},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:9,padding:8,font:{size:10}}},
          tooltip:{...tip,callbacks:{label:c=>c.dataset.label+': '+c.raw.toFixed(1)+'%'}}},
        scales:{x:{grid},y:{grid,ticks:{callback:v=>v+'%'},
          min:Math.max(0,Math.floor(Math.min(...fw.map(w=>w.occ_60d))-3)),
          max:Math.min(100,Math.ceil(Math.max(...fw.map(w=>w.curr_occ))+2))}}}
    });
  }
}
